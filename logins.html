<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' https://www.gstatic.com/firebasejs/;
                   style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
                   font-src https://unpkg.com https://fonts.gstatic.com;
                   connect-src https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com;
                   img-src 'self' data:;">
    <link rel="stylesheet" href="logins.css" />
    <link rel="stylesheet"
          href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
          integrity="sha384-42kyIPf7HDYLkGffmxDhSx/3Z/53wGBs3nD6wEFxsbeDc7rMO6mkYbkAcpRsnMU2"
          crossorigin="anonymous" />
    <title>Login</title>
</head>

<body>
<div class="container">
    <div class="forms-container">
        <div class="signin-signup">

            <!--  LOGIN FORM -->
            <form class="sign-in-form" id="loginForm" autocomplete="off">
                <h2 class="title">Sign in</h2>

                <div class="input-field">
                    <i class='bx bxs-user'></i>
                    <input type="email" id="email" placeholder="Email"
                           required maxlength="254" autocomplete="email" />
                </div>

                <div class="input-field">
                    <i class='bx bxs-lock-alt'></i>
                    <input type="password" id="password" placeholder="Password"
                           required maxlength="128" autocomplete="current-password" />
                </div>

                <input type="submit" value="Login" class="btn solid" />
            </form>

        </div>
    </div>

    <!--  PANEL -->
    <div class="panels-container">
        <div class="panel left-panel">
            <div class="content">
                <h3>New here?</h3>

                <!--CONNECTED TO SIGNUP PAGE -->
                <button class="btn transparent" id="sign-up-btn" type="button">
                    <a href="signup.html" style="text-decoration: none; color: inherit;">
                    Sign up
                    </a>
                </button>
            </div>
        </div>
    </div>
</div>

<!--- IMPORTANT: USE MODULE -->
<script type="module" src="script.js"></script>
</body>
</html>
